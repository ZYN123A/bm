# ========================
# Clash-ALL 终极整合配置文件 (正则修正版)
# ========================

proxy-providers:
  FlowerCloud:
    url: "httFapi.xmancdn.n4c7k2%26sip002%3D1"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连

  SSRDOG:
    url: "httpsoute=1"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连

proxies:
  - {name: 直连, type: direct}
  - {name: 拒绝, type: reject}

# ========================
# 系统与 DNS 设置
# ========================
port: 7890
mixed-port: 7893
allow-lan: true
mode: rule
log-level: info
external-controller: 0.0.0.0:9090
secret: "123456"

dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.20.0.1/16
  nameserver: [223.5.5.5]
  fake-ip-filter: ["+.lan", "+.local", "geosite:cn", "+.km688.ink", "+.onesubv.site", "+.oneyyds.online", "+.fengyyds.site", "+.onemg.top", "+.chybinc.com", "+.invitevp.com", "+.vp2.us", "+.xiaoniuyun.cc", "+.apple-bing.sbs", "+.bncrcloud.com", "+.xby01.xyz", "+.idsduf.com", "+.66jc.top", "+.gfw.gg", "+.moedog.cloud", "+.ynhtbank.com", "+.qeayr.cn", "+.saojc.xyz", "+.sssyun.xyz", "+.dler.cloud", "+.0tk8a3a1q4t94dler.com", "+.aerianas.top", "+.gptacg.top", "+.wxda.net"]

tun:
  enable: true
  stack: gvisor
  device: utun
  auto-route: true

# ========================
# 策略组定义 (Anchor)
# ========================
default: &default
  type: select
  proxies:
    - 全地区低倍率-故转  # 首选
    - 所有-智选
    - 香港-故转
    - 台湾-故转
    - 日本-故转
    - 新加坡-故转
    - 美国-故转
    - 其他-故转
    - 所有-手选
    - 直连
    - 拒绝

proxy-groups:
  # --- 1. 业务分流组 (遵循低倍率优先) ---
  - {name: AI, <<: *default}
  - {name: Meta AI, <<: *default}
  - {name: Perplexity, <<: *default}
  - {name: Stream Media, <<: *default}
  - {name: GitHub, <<: *default}
  - {name: Reddit, <<: *default}  
  - {name: Apple, <<: *default}
  - {name: Microsoft, <<: *default}
  - {name: Games, <<: *default}
  - {name: Crypto, <<: *default}
  - {name: Block, <<: *default}
  - {name: 国外, <<: *default}
  - {name: 其他, <<: *default}  

  # --- 2. 业务分流组 (直连优先) ---
  - name: 国内
    type: select
    proxies: [直连, 全地区低倍率-故转, 所有-智选, 所有-手选]

  - name: Nvidia
    type: select
    proxies: [直连, 全地区低倍率-故转, 所有-智选, 美国-故转]

  - name: Test
    type: select
    proxies: [直连, 全地区低倍率-故转, 所有-智选, 香港-故转]

  # --- 3. 刮削专项 ---
  - name: 日本刮削
    type: select
    proxies: [日本低倍率-故转, 日本-故转, 日本-手选, 直连]
  - name: 非日刮削
    type: select
    proxies: [非日低倍率-故转, 新加坡-故转, 香港-故转, 美国-故转, 直连]

  # --- 4. 节点逻辑与过滤 (套用你提供的正则) ---
  
  # 全地区低倍率
  - {name: 全地区低倍率-故转, type: fallback, proxies: [全地区低倍率-手选, 全地区低倍率-智选]}
  - name: 全地区低倍率-手选
    type: select
    include-all: true
    filter: "(实验性|0\\.1x|0\\.1X|0\\.2x|0\\.5x|低倍率|倍率)"
  - name: 全地区低倍率-智选
    type: smart
    include-all: true
    filter: "(实验性|0\\.1x|0\\.1X|0\\.2x|0\\.5x|低倍率|倍率)"
    interval: 180

  # 日本低倍率
  - {name: 日本低倍率-故转, type: fallback, proxies: [日本低倍率-手选, 日本低倍率-智选]}
  - name: 日本低倍率-手选
    type: select
    include-all: true
    filter: "^(?=.*(实验性|0\\.1x|0\\.1X|0\\.2x|0\\.5x|低倍率|倍率))(?=.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)).*$"
  - name: 日本低倍率-智选
    type: smart
    include-all: true
    filter: "^(?=.*(实验性|0\\.1x|0\\.1X|0\\.2x|0\\.5x|低倍率|倍率))(?=.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)).*$"
    interval: 180

  # 非日低倍率
  - {name: 非日低倍率-故转, type: fallback, proxies: [非日低倍率-手选, 非日低倍率-智选]}
  - name: 非日低倍率-手选
    type: select
    include-all: true
    filter: "^(?=.*(实验性|0\\.1x|0\\.1X|0\\.2x|0\\.5x|低倍率|倍率))(?!.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)).*$"
  - name: 非日低倍率-智选
    type: smart
    include-all: true
    filter: "^(?=.*(实验性|0\\.1x|0\\.1X|0\\.2x|0\\.5x|低倍率|倍率))(?!.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)).*$"
    interval: 180

  # 基础地域组
  - {name: 所有-手选, type: select, include-all: true, filter: "^((?!(直连|拒绝)).)*$"}
  - {name: 所有-智选, type: smart, include-all: true, policy-priority: ".*牛逼.*:0.8;.*(香港|HK).*:1.2", interval: 180, filter: "^((?!(直连|拒绝)).)*$"}

  - {name: 香港-故转, type: fallback, proxies: [香港-手选, 香港-智选]}
  - {name: 香港-手选, type: select, include-all: true, filter: "(?=.*(香港|HK|Hong Kong|🇭🇰)).*$"}
  - {name: 香港-智选, type: smart, include-all: true, filter: "(?=.*(香港|HK|Hong Kong|🇭🇰)).*$"}

  - {name: 台湾-故转, type: fallback, proxies: [台湾-手选, 台湾-智选]}
  - {name: 台湾-手选, type: select, include-all: true, filter: "(?=.*(台湾|台灣|TW|🇹🇼|Tai)).*$"}
  - {name: 台湾-智选, type: smart, include-all: true, filter: "(?=.*(台湾|台灣|TW|🇹🇼|Tai)).*$"}

  - {name: 日本-故转, type: fallback, proxies: [日本-手选, 日本-智选]}
  - {name: 日本-手选, type: select, include-all: true, filter: "(?=.*(日本|JP|🇯🇵|Japan)).*$"}
  - {name: 日本-智选, type: smart, include-all: true, filter: "(?=.*(日本|JP|🇯🇵|Japan)).*$"}

  - {name: 新加坡-故转, type: fallback, proxies: [新加坡-手选, 新加坡-智选]}
  - {name: 新加坡-手选, type: select, include-all: true, filter: "(?=.*(新加坡|SG|坡|🇸🇬|Singapore)).*$"}
  - {name: 新加坡-智选, type: smart, include-all: true, filter: "(?=.*(新加坡|SG|坡|🇸🇬|Singapore)).*$"}

  - {name: 美国-故转, type: fallback, proxies: [美国-手选, 美国-智选]}
  - {name: 美国-手选, type: select, include-all: true, filter: "(?=.*(美国|US|🇺🇸|United States)).*$"}
  - {name: 美国-智选, type: smart, include-all: true, filter: "(?=.*(美国|US|🇺🇸|United States)).*$"}

  - {name: 其他-故转, type: fallback, proxies: [其他-手选, 其他-智选]}
  - {name: 其他-手选, type: select, include-all: true, filter: "^((?!(直连|拒绝|香港|HK|台湾|TW|日本|JP|新加坡|SG|美国|US)).)*$"}
  - {name: 其他-智选, type: smart, include-all: true, filter: "^((?!(直连|拒绝|香港|HK|台湾|TW|日本|JP|新加坡|SG|美国|US)).)*$"}

# ========================
# 规则引擎
# ========================
rules:
  - RULE-SET,TEST / Domain,Test
  - RULE-SET,Block / Domain,Block  
  - RULE-SET,GitHub / Domain,GitHub      
  - RULE-SET,ChatGPT / Domain,AI
  - RULE-SET,Claude / Domain,AI
  - RULE-SET,Copilot / Domain,AI
  - RULE-SET,Gemini / Domain,AI
  - RULE-SET,Groq / Domain,AI
  - RULE-SET,Grok / Domain,AI
  - RULE-SET,Meta AI / Domain,Meta AI
  - RULE-SET,Perplexity / Domain,Perplexity
  
  - RULE-SET,Youtube / Domain,Stream Media
  - RULE-SET,TikTok / Domain,Stream Media
  - RULE-SET,Netflix / Domain,Stream Media
  - RULE-SET,Netflix / IP,Stream Media,no-resolve
  
  - RULE-SET,日本刮削,日本刮削
  - RULE-SET,非日刮削,非日刮削

  - RULE-SET,Microsoft / Domain,Microsoft
  - RULE-SET,Apple / Domain,Apple
  - RULE-SET,Nvidia / Domain,Nvidia
  - RULE-SET,Steam / Domain,Games
  - RULE-SET,OKX / Domain,Crypto
  
  - RULE-SET,Direct / Domain,国内
  - RULE-SET,China / Domain,国内
  - RULE-SET,China / IP,国内,no-resolve
  - MATCH,其他

