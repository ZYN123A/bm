  - {name: Claude, <<: *default, icon: "https://api.iconify.design/logos:claude-icon.svg"}
  - {name: Meta AI, <<: *default, icon: "https://api.iconify.design/logos:meta-icon.svg"}
  - {name: GitHub, <<: *default, icon: "https://api.iconify.design/logos:github-icon.svg"}
  - {name: Reddit, <<: *default, icon: "https://api.iconify.design/logos:reddit-icon.svg"}
  - {name: Telegram, <<: *default, icon: "https://api.iconify.design/logos:telegram.svg"}
  - {name: WhatsApp, <<: *default, icon: "https://api.iconify.design/logos:whatsapp-icon.svg"}
  - {name: Facebook, <<: *default, icon: "https://api.iconify.design/logos:facebook.svg"}
  - {name: YouTube, <<: *default, icon: "https://api.iconify.design/logos:youtube-icon.svg"}
  - {name: TikTok, <<: *default, icon: "https://api.iconify.design/logos:tiktok-icon.svg"}
  - {name: Netflix, <<: *default, icon: "https://api.iconify.design/logos:netflix-icon.svg"}
  - {name: HBO, <<: *default, icon: "data:image/svg+xml;base64,"}
  - {name: Disney, <<: *default, icon: "data:image/svg+xml;base64,"}
  - {name: Amazon, <<: *default, icon: "https://api.iconify.design/logos:aws.svg"}
  - {name: Crunchyroll, <<: *default, icon: "data:image/svg+xml;base64,"}
  - {name: Spotify, <<: *default, icon: "https://api.iconify.design/logos:spotify-icon.svg"}
  - {name: Steam, <<: *default, icon: "https://api.iconify.design/logos:steam.svg"}
  - {name: Games, <<: *default, icon: "https://api.iconify.design/fluent-emoji:video-game.svg"}
  - {name: Crypto, <<: *default, icon: "https://api.iconify.design/logos:bitcoin.svg"}
  - {name: Apple, <<: *default, icon: "https://api.iconify.design/logos:apple.svg"}
  - {name: Google, <<: *default, icon: "https://api.iconify.design/logos:google-icon.svg"}
  - {name: Microsoft, <<: *default, icon: "https://api.iconify.design/logos:microsoft-icon.svg"}
  - {name: Test, <<: *default, icon: "data:image/svg+xml;base64,"}
  - {name: Block, <<: *default, icon: "https://api.iconify.design/fluent-emoji:prohibited.svg"}
  - {name: 国外, <<: *default, icon: "https://api.iconify.design/fluent-emoji:globe-showing-americas.svg"}
  - {name: 其他, <<: *default, icon: "data:image/svg+xml;base64,"}
  

  # 2. 特殊业务组 (保持🚀 直连第一)
  - name: Nvidia
    type: select
    proxies: [🚀 直连, 低倍率-故转, 所有-智选, 香港-故转, 日本-故转, 美国-故转, ❌ 拒绝]
    icon: "https://api.iconify.design/logos:nvidia.svg"

  - name: 国内
    type: select
    proxies: [🚀 直连, 低倍率-故转, 所有-智选, 所有-手选, ❌ 拒绝]
    icon: "data:image/svg+xml;base64,"

  # 3. 刮削专属组
  - {name: 日本刮削, type: select, proxies: [日本低倍率-故转, 日本-故转, 🚀 直连], icon: "https://p-smith.com/logo/fanza_r18.svg"}
  - {name: 非日刮削, type: select, proxies: [非日低倍率-故转, 其他-故转, 🚀 直连], icon: "https://p-smith.com/logo/fanza_r18.svg"}

  # 4. 全球/所有组
  - name: 所有-手选
    type: select
    include-all: true
    filter: "^((?!(🚀 直连|❌ 拒绝)).)*$"
    icon: "data:image/svg+xml;base64,"

  - name: 所有-智选
    type: smart
    include-all: true
    policy-priority: "香港:1.2;牛逼:0.8"
    uselightgbm: true
    collectdata: true
    interval: 300
    filter: "^((?!(🚀 直连|❌ 拒绝)).)*$"
    icon: "data:image/svg+xml;base64,"

  # 5. 低倍率逻辑组 (由 smart 驱动)
  - {name: 低倍率-故转, type: fallback, interval: 300, proxies: [低倍率-手选, 低倍率-智选], icon: "data:image/svg+xml;base64,"}
  - {name: 低倍率-手选, type: select, include-all: true, filter: "(实验性|0\\.1x|0\\.1X|0\\.2x|0\\.5x|低倍率|倍率)", icon: "data:image/svg+xml;base64,"}
  - {name: 低倍率-智选, type: smart, include-all: true, uselightgbm: true, collectdata: true, interval: 300, filter: "(实验性|0\\.1x|0\\.1X|0\\.2x|0\\.5x|低倍率|倍率)", icon: "data:image/svg+xml;base64,"}

  - {name: 日本低倍率-故转, type: fallback, interval: 300, proxies: [日本低倍率-手选, 日本低倍率-智选], icon: "data:image/svg+xml;base64,"}
  - {name: 日本低倍率-手选, type: select, include-all: true, filter: "^(?=.*(实验性|0\\.1x|0\\.1X|0\\.2x|0\\.5x|低倍率|倍率))(?=.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)).*$", icon: "data:image/svg+xml;base64,"}
  - {name: 日本低倍率-智选, type: smart, include-all: true, uselightgbm: true, collectdata: true, interval: 300, filter: "^(?=.*(实验性|0\\.1x|0\\.1X|0\\.2x|0\\.5x|低倍率|倍率))(?=.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)).*$", icon: "data:image/svg+xml;base64,"}

  - {name: 非日低倍率-故转, type: fallback, interval: 300, proxies: [非日低倍率-手选, 非日低倍率-智选], icon: "data:image/svg+xml;base64,"}
  - {name: 非日低倍率-手选, type: select, include-all: true, filter: "^(?=.*(实验性|0\\.1x|0\\.1X|0\\.2x|0\\.5x|低倍率|倍率))(?!.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)).*$", icon: "data:image/svg+xml;base64,"}
  - {name: 非日低倍率-智选, type: smart, include-all: true, uselightgbm: true, collectdata: true, interval: 300, filter: "^(?=.*(实验性|0\\.1x|0\\.1X|0\\.2x|0\\.5x|低倍率|倍率))(?!.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)).*$", icon: "data:image/svg+xml;base64,"}

  # 6. 原有地区组逻辑
  - name: 香港-故转
    type: fallback
    interval: 300
    proxies: [香港-手选, 香港-智选]
    icon: "data:image/svg+xml;base64,"
  - name: 香港-手选
    type: select
    include-all: true
    filter: "(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$"
    icon: "data:image/svg+xml;base64,"
  - name: 香港-智选
    type: smart
    include-all: true
    interval: 300
    filter: "(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$"
    icon: "data:image/svg+xml;base64,"

  - name: 台湾-故转
    type: fallback
    interval: 300
    proxies: [台湾-手选, 台湾-智选]
    icon: "data:image/svg+xml;base64,"
  - name: 台湾-手选
    type: select
    include-all: true
    filter: "(?=.*(广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan)).*$"
