# ========================
# 策略组定义
# ========================

# 标准锚点：低倍率第一，🚀 直连倒数第二
default: &default
  type: select
  proxies:
    - 低倍率-故转
    - 所有-智选
    - 所有-手选
    - 香港-故转
    - 台湾-故转
    - 日本-故转
    - 新加坡-故转
    - 韩国-故转
    - 美国-故转
    - 英国-故转
    - 其他-故转
    - 🚀 直连
    - ❌ 拒绝

proxy-groups:

  # 1. 业务分流组 (遵循锚点)
  - {name: ChatGPT, <<: *default, icon: "https://api.iconify.design/logos:openai-icon.svg"}
  - {name: Gemini, <<: *default, icon: "https://api.iconify.design/logos:google-gemini.svg"}
  - {name: Copilot, <<: *default, icon: "https://raw.githubusercontent.com/ZYN123A/bm/refs/heads/main/copilot-icon.svg"}
