    icon: "data:image/svg+xml;base64,"
  - name: 日本-智选
    type: smart
    include-all: true
    interval: 300
    filter: "(?=.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)).*$"
