# ========================
# Clash-ALL 双机场极致省流 [完整修正版]
# ========================

# 基础代理定义
proxies:
  - {name: 🚀 直连, type: direct}
  - {name: 🚫 拒绝, type: reject}

# 机场节点订阅
proxy-providers:
  FlowerCloud:
    url: "https://api-huacloud.net/sub?target=clash&insert=true&emoji=true&udp=true&clash.doh=true&new_name=true&filename=Flower_SS.yaml&url=https%3A%2F%2Fapi.xmancdn.net%2Fosubscribe.php%3Ftoken2%3Dy89knzkq-51cef23b200kl4c7k2%26sip002%3D1"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 🚀 直连

  SSRDOG:
    url: "https://be6454034c3513812039e7c9714c988c.m4hs-9ekt-y2qb-fa7x-wl6r.sbs/s?q=27b28e65&t=be6454034c3513812039e7c9714c988c.jpg&flag=clash&route=1"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 🚀 直连

# ========================
# 基础设置
# ========================
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895
allow-lan: true
mode: rule
log-level: info
ipv6: true
external-controller: 0.0.0.0:9090
secret: "123456"

dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.20.0.1/16
  nameserver: [223.5.5.5]
  fake-ip-filter:
    - +.lan
    - +.local
    - geosite:cn
    - "*.bambulab.com"

tun:
  enable: true
  stack: gvisor
  device: utun
  auto-route: false
  auto-detect-interface: false

profile:
  store-selected: true
  store-fake-ip: true

# ========================
# 策略组定义
# ========================

default: &default
  type: select
  proxies:
    - 📉 低倍率-自动
    - ⚡ 所有-自动
    - 🛠️ 所有-手动
    - 🇭🇰 香港-自动
    - 🇨🇳 台湾-自动
    - 🇯🇵 日本-自动
    - 🇸🇬 新加坡-自动
    - 🇰🇷 韩国-自动
    - 🇺🇸 美国-自动
    - 🇬🇧 英国-自动
    - 🌍 其他-自动
    - 🚀 直连
    - 🚫 拒绝

proxy-groups:
  - {name: 🤖 ChatGPT, <<: *default}
  - {name: ♊ Gemini, <<: *default}
  - {name: 🚀 Copilot, <<: *default}
  - {name: 🔍 Perplexity, <<: *default}
  - {name: 🎭 Claude, <<: *default}
  - {name: ♾️ Meta AI, <<: *default}
  - {name: 🐦 Grok, <<: *default}
  - {name: ⚡ Groq, <<: *default}
  - {name: 🐙 GitHub, <<: *default}
  - {name: 🧡 Reddit, <<: *default}
  - {name: ✈️ Telegram, <<: *default}
  - {name: 💬 WhatsApp, <<: *default}
  - {name: 👥 Facebook, <<: *default}
  - {name: 📺 BiliBili, <<: *default}
  - {name: 🎥 YouTube, <<: *default}
  - {name: 🎵 TikTok, <<: *default}
  - {name: 🎬 Netflix, <<: *default}
  - {name: 🔮 HBO, <<: *default}
  - {name: 🏰 Disney, <<: *default}
  - {name: 📦 Amazon, <<: *default}
  - {name: 🍣 Crunchyroll, <<: *default}
  - {name:  popcorn, <<: *default}
  - {name: 🎶 Spotify, <<: *default}
  - {name: 💚 Nvidia, <<: *default}
  - {name: 🎮 Steam, <<: *default}
  - {name: 🕹️ Games, <<: *default}
  - {name: 💰 Crypto, <<: *default}
  - {name: 🍎 Apple, <<: *default}
  - {name: 🔍 Google, <<: *default}
  - {name: 💻 Microsoft, <<: *default}
  - {name: 🧪 Test, <<: *default}
  - {name: 🛡️ Block, <<: *default}

  - name: 🗺️ 国外
    type: select
    proxies: [📉 低倍率-自动, ⚡ 所有-自动, 🛠️ 所有-手动, 🚀 直连, 🚫 拒绝]

  - name: 🇨🇳 国内
    type: select
    proxies: [🚀 直连, 🚫 拒绝, 📉 低倍率-自动, 🛠️ 所有-手动]

  - name: 🍃 其他
    type: select
    proxies: [🚀 直连, 📉 低倍率-自动, ⚡ 所有-自动, 🛠️ 所有-手动, 🚫 拒绝]

  - name: 🎌 日本刮削
    type: select
    proxies: [📉 日本低倍率-自动, 🇯🇵 日本-手动, 🚀 直连, 🚫 拒绝]

  - name: 🎞️ 非日刮削
    type: select
    proxies: [📉 非日低倍率-自动, 🇭🇰 香港-自动, 🇨🇳 台湾-自动, 🇸🇬 新加坡-自动, 🇰🇷 韩国-自动, 🇺🇸 美国-自动, 🌍 其他-自动, 🚀 直连, 🚫 拒绝]

  - name: 🛠️ 所有-手动
    type: select
    include-all: true
    filter: "^((?!(🚀 直连|🚫 拒绝)).)*$"

  - name: ⚡ 所有-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 300
    filter: "^((?!(🚀 直连|🚫 拒绝)).)*$"

  - name: 📉 低倍率-自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 180
    include-all: true
    filter: "(实验性|0\\.1x|0\\.1X|0\\.2x|0\\.5x|低倍率|倍率)"

  - name: 📉 非日低倍率-自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    include-all: true
    filter: "^(?=.*(实验性|0\\.1x|0\\.1X|0\\.2x|0\\.5x|低倍率|倍率))(?!.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)).*$"

  - name: 📉 日本低倍率-自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    include-all: true
    filter: "^(?=.*(实验性|0\\.1x|0\\.1X|0\\.2x|0\\.5x|低倍率|倍率))(?=.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)).*$"

  - name: 🇭🇰 香港-自动
    type: url-test
    include-all: true
    interval: 300
    filter: "(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$"

  - name: 🇨🇳 台湾-自动
    type: url-test
    include-all: true
    interval: 300
    filter: "(?=.*(广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan)).*$"

  - name: 🇯🇵 日本-手动
    type: select
    include-all: true
    filter: "(?=.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)).*$"

  - name: 🇯🇵 日本-自动
    type: url-test
    include-all: true
    interval: 300
    filter: "(?=.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)).*$"

  - name: 🇸🇬 新加坡-自动
    type: url-test
    include-all: true
    interval: 300
    filter: "(?=.*(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore)).*$"

  - name: 🇰🇷 韩国-自动
    type: url-test
    include-all: true
    interval: 300
    filter: "(?=.*(广韩|韩国|韓國|KR|首尔|春川|🇰🇷|Korea)).*$"

  - name: 🇺🇸 美国-自动
    type: url-test
    include-all: true
    interval: 300
    filter: "(?=.*(广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States)).*$"

  - name: 🇬🇧 英国-自动
    type: url-test
    include-all: true
    interval: 300
    filter: "(?=.*(英国|英|伦敦|UK|United Kingdom|🇬🇧|London)).*$"

  - name: 🌍 其他-自动
    type: url-test
    include-all: true
    interval: 300
    filter: "^((?!(🚀 直连|🚫 拒绝|广港|香港|HK|Hong Kong|🇭🇰|HongKong|广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan|广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan|广新|新加坡|SG|坡|狮城|🇸🇬|Singapore|广韩|韩国|韓國|KR|首尔|春川|🇰🇷|Korea|广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States|英国|UK|United Kingdom|伦敦|英|London|🇬🇧)).)*$"

